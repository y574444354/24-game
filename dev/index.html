<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>24点游戏 - 本地开发</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0F0F23;
      overflow: hidden;
      touch-action: none;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    /* 手机尺寸模拟边框（PC 开发时显示手机比例） */
    @media (min-width: 500px) {
      body { display: flex; justify-content: center; align-items: center; background: #111; }
      #gameCanvas {
        width: 375px;
        height: 667px;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
        border-radius: 20px;
      }
    }
    /* Toast 提示 */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-family: sans-serif;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9999;
    }
    /* 开发提示条 */
    #devbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(255,200,0,0.15);
      color: #FFD700;
      font-size: 11px;
      font-family: monospace;
      text-align: center;
      padding: 2px 0;
      z-index: 9998;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- 游戏 Canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Toast 提示层 -->
  <div id="toast"></div>

  <!-- 开发环境提示条 -->
  <div id="devbar">🛠 开发模式 | 鼠标点击 = 触摸 | 存储: localStorage | 广告: 弹窗模拟</div>

  <!-- 1. 先加载 wx 模拟层 -->
  <script src="wx-mock.js"></script>

  <!-- 2. 再加载打包后的游戏代码 -->
  <script src="bundle.js"></script>

</body>
</html>
